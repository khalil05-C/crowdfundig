
{% extends 'base.html' %}
{% block title %}Inscription – FundRise MA{% endblock %}

{% block content %}
<section class="min-vh-100 d-flex align-items-center py-5" style="background:#F0F9FF">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card p-4 p-md-5">

                    <!-- Logo -->
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">
                            Fund<span style="color:#F4A261">Rise</span> MA
                        </h2>
                        <p class="text-muted small">Créez votre compte </p>
                    </div>

                    <!-- Formulaire -->
                    <form method="post">
                        {% csrf_token %}

                        <div class="row g-3">

                            <!-- Prénom & Nom -->
                            <div class="col-sm-6">
                                <label class="form-label fw-semibold small">Prénom</label>
                                <input type="text" name="first_name" class="form-control rounded-3"
                                       placeholder="Votre prénom" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-semibold small">Nom</label>
                                <input type="text" name="last_name" class="form-control rounded-3"
                                       placeholder="Votre nom" required>
                            </div>

                            <!-- Email -->
                            <div class="col-12">
                                <label class="form-label fw-semibold small">Email</label>
                                <input type="email" name="email" class="form-control rounded-3"
                                       placeholder="email@exemple.com" required>
                            </div>

                            <!-- Rôle -->
                            <div class="col-12">
                                <label class="form-label fw-semibold small">Je souhaite</label>
                                <select name="role" class="form-select rounded-3">
                                    <option value="contributor">Contribuer à des projets</option>
                                    <option value="project_owner">Publier mes propres projets</option>
                                </select>
                            </div>

                            <!-- Mot de passe -->
                            <div class="col-sm-6">
                                <label class="form-label fw-semibold small">Mot de passe</label>
                                <input type="password" name="password1" class="form-control rounded-3"
                                       placeholder="••••••••" required>
                            </div>
                            <div class="col-sm-6">
                                <label class="form-label fw-semibold small">Confirmer</label>
                                <input type="password" name="password2" class="form-control rounded-3"
                                       placeholder="••••••••" required>
                            </div>

                            <!-- CGU -->
                            <div class="col-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="terms" required>
                                    <label class="form-check-label small">
                                        J'accepte les <a href="#" style="color:#1A3C5E">conditions d'utilisation</a>
                                    </label>
                                </div>
                            </div>

                            <!-- Bouton -->
                            <div class="col-12">
                                <button type="submit" class="btn btn-accent w-100 py-2 fw-semibold">
                                    <i class="bi bi-rocket me-2"></i>Créer mon compte
                                </button>
                            </div>

                        </div>
                    </form>

                    <hr class="my-4">

                    <p class="text-center text-muted small mb-0">
                        Déjà un compte ?
                        <a href="/accounts/login/" class="fw-semibold text-decoration-none" style="color:#1A3C5E">
                            Se connecter
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
